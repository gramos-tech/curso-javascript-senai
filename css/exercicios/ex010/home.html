<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border: 0;
        }

        body{
            color: black;
        }

        header{
            background-color: black;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;

            height: 200px;
        }

        nav{
            width: 500px;
        }

        ul{
            display: flex;
            list-style-type: none;
            justify-content: space-around;

        a{
            color: white;
            text-decoration: none;
        }

        section{

            height: 300px;

        #card{

            height: 100px;
        }

<body>
    
    <header>
        <div>
            Logo
        </div>

        <nav>
           <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Produtos</a></li>
            <li><a href="#">Contatos</a></li>
            <li><a href="#">Sobre</a></li>

        </nav>
    </header>


    <main>

        <section>
            <article id="card">
                Noticias
            </article>
        </section>

    </main>


    <footer>

    </footer>

</html>
