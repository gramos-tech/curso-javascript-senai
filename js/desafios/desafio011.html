<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
        }

        form {
            width: 300px;
            display: flex;
            flex-direction: column;
            background-color: lightblue;
            padding: 20px;
            box-shadow: 1px 2px 15px 2px black;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            border: none;
            border-radius: 10px;
        }

        label {
            margin: 5px;
            font-weight: bold;
        }

        .btn-value {
            padding: 7px;
        }

        .btn-submit {
            margin: 30px 5px 0 0;
            padding: 13px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit:hover {
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>

    <form id="formulario">

        <h1 id="titulo">Login</h1>

        <label for="email">Email:</label>
        <input type="text" name="email" id="email" class="btn-value">

        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha" class="btn-value">

        <button type="submit" value="Enviar" class="btn-submit">Enviar</button>

    </form>

    <script>

        const form = document.getElementById('formulario')

        const emailCorreto = 'guhramos@senai.com'
        const senhaCorreta = '123456'

        form.addEventListener('submit', function (event) {
            event.preventDefault()

            const emailUsuario = document.getElementById('email').value
            const senhaUsuario = document.getElementById('senha').value

            if (emailUsuario === emailCorreto && senhaUsuario === senhaCorreta) {
                document.location.href = 'page02.html'
            }else{
                alert('Usuário ou senha incorretos!')
            }
        }
        )



    </script>

</body>

</html>
