<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    
    <h1>Trocando cor do fundo da tela</h1>

    <script>

        let corUsuario = window.prompt("Digite uma cor em inglês")
        console.log(corUsuario)

        let pagina = window.document.getElementsByTagName('body')[0]
        pagina.style.backgroundColor = corUsuario

    </script>

</body>

</html>
